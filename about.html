<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Redirecting…</title>
<meta http-equiv="refresh" content="0; url=/thailand/about.html">
<link rel="canonical" href="https://www.studyeventz.com/thailand/about.html">
<meta name="robots" content="noindex">
<script>
  try {
    const saved = localStorage.getItem('studyeventz_country');
    const country = (saved && /^[a-z\-]+$/.test(saved)) ? saved : 'thailand';
    location.replace('/' + country + '/about.html');
  } catch (e) {
    location.replace('/thailand/about.html');
  }
</script>
</head>
<body>
<p>Redirecting to <a href="/thailand/about.html">studyeventz</a>…</p>
</body>
</html>
